<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bennett Eatery</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="Pages/styles.css">
</head>
<body>
    <div class="bg-blur"></div>
    <div id="mainpage">
        <header class="fixed-top  border-bottom shadow-sm">
            <div class="container-fluid d-flex align-items-center justify-content-between py-2 px-4">
                <!-- Logo -->
                <a href="home.html">
                    <img src="Resources/Logo.jpg" alt="Home" id="logoimg" class="img-fluid" style="width: 50px;">
                </a>
    
                <!-- User Profile -->
                <a href="Pages/Profile.html">
                    <img src="Resources/user.png" alt="User Profile" id="usr" class="img-fluid rounded-circle" style="width: 40px;">
                </a>
            </div>
        </header>
        
        <main class="container-fluid">
            <section class="row justify-content-center align-items-center min-vh-100">
                <!-- Eatery Items -->
                <div class="col-10 col-md-8 col-lg-6">
                    <div class="row g-4">
                        <div class="col-12 col-sm-6">
                            <a href="Pages/Kathi.html" class="eatery-link">
                                <div class="eatery" id="kathi"></div>
                            </a>
                        </div>
                        <div class="col-12 col-sm-6">
                            <a href="Pages/ChaiOK.html" class="eatery-link">
                                <div class="eatery" id="chai"></div>
                            </a>
                        </div>
                        <div class="col-12 col-sm-6">
                            <a href="Pages/HotSpot.html" class="eatery-link">
                                <div class="eatery" id="hots"></div>
                            </a>
                        </div>
                        <div class="col-12 col-sm-6">
                            <a href="Pages/Quench.html" class="eatery-link">
                                <div class="eatery" id="quench"></div>
                            </a>
                        </div>
                        <div class="col-12 col-sm-6">
                            <a href="Pages/SnapEats.html" class="eatery-link">
                                <div class="eatery" id="snape"></div>
                            </a>
                        </div>
                        <div class="col-12 col-sm-6">
                            <a href="Pages/Souther.html" class="eatery-link">
                                <div class="eatery" id="south"></div>
                            </a>
                        </div>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
