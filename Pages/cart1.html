<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cart</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header class="fixed-top bg-light border-bottom shadow-sm">
        <div class="container-fluid d-flex align-items-center justify-content-between py-2 px-4">
            <a href="../home.html">
                <img src="../Resources/Logo.jpg" alt="Home" id="logoimg" class="img-fluid" style="width: 50px;">
            </a>
            <a href="Profile.html">
                <img src="../Resources/user.png" alt="User Profile" id="usr" class="img-fluid rounded-circle" style="width: 40px;">
            </a>
        </div>
    </header>
    <main class="container mt-5 pt-5">
        <section class="cart-container" style="display: flex; justify-content: center; align-content: center; overflow: hidden;">
            <main class="container mt-5 pt-5">
            <h2 class="text-center">Your Cart</h2>
            <div id="cartItems" class="mt-3"></div>
            <h3 class="text-center mt-3" id="totalAmount"></h3>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
