<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cart</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="styles2.css">
</head>
<body>
    <div class="bg-blur"></div>
    <header class="fixed-top border-bottom shadow-sm" style="background-color: rgba(255, 255, 255, 0.7) !important;">
        <div class="container-fluid d-flex align-items-center justify-content-between py-2 px-4">
            <a href="../home.html">
                <img src="../Resources/Logo.jpg" alt="Home" id="logoimg" class="img-fluid" style="width: 50px;">
            </a>
            <a href="Profile.html">
                <img src="../Resources/user.png" alt="User Profile" id="usr" class="img-fluid rounded-circle" style="width: 40px;">
            </a>
        </div>
    </header>
    <main class="container mt-5 pt-5">
        <section class="cart-container" style="max-width: 800px; margin: 0 auto;">
            <h2 class="text-center mb-4" style="text-shadow: 2px 2px 4px rgba(0,0,0,0.1); display: block;">Your Cart</h2>
            <div class="bg-light rounded p-4 shadow-sm">
                <div id="cartItems" class="mb-4" style="display: block;">
                    <!-- Cart items will be loaded here -->
                </div>
                <h3 class="text-center mt-4 p-3 bg-white rounded shadow-sm" id="totalAmount"></h3>
            </div>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
