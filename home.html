<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bennett Eatery</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="Pages/styles.css">
</head>
<body >
    <div class="bg-blur"></div>
        <div id="mainpage">
    <header class="fixed-top  border-bottom shadow-sm">
        <div class="container-fluid d-flex align-items-center justify-content-between py-2 px-4">

            <a href="home.html">
                <img src="Resources/Logo.jpg" alt="Home" id="logoimg" class="img-fluid" style="width: 50px;">
            </a>

            <!-- User Profile -->
            <a href="Pages/Profile.html">

</div>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
